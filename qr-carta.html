<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR - Código de Acceso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #ffd6e8 40%, #fce4ec 70%, #ffe8f5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Arial', sans-serif;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(194, 24, 91, 0.2);
      text-align: center;
      max-width: 500px;
    }

    h1 {
      color: #c2185b;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    p {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    #qrContainer {
      background: white;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      margin-bottom: 30px;
    }

    #qrCode {
      width: 100%;
      height: 100%;
    }

    .url-text {
      color: #999;
      font-size: 0.8rem;
      word-break: break-all;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-top: 20px;
    }

    .instructions {
      color: #555;
      font-size: 0.9rem;
      margin-top: 20px;
      line-height: 1.6;
    }

    .download-btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: #e91e8c;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.3s;
    }

    .download-btn:hover {
      background: #c2185b;
    }

    .hearts {
      font-size: 1.5rem;
      margin-bottom: 15px;
      letter-spacing: 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="hearts">💌 ❤️ 💌</div>
    <h1>✦ Tu Carta ✦</h1>
    <p>Escanea el código QR para abrir la carta especial</p>

    <div id="qrContainer"></div>

    <div class="url-text" id="urlText"></div>

    <button class="download-btn" onclick="descargarQR()">Descargar QR como PNG</button>

    <div class="instructions">
      <strong>Instrucciones:</strong><br>
      • Escanea con tu celular<br>
      • O copia la URL abajo<br>
      • Abre el archivo en tu navegador
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    // Ruta del archivo en GitHub Pages
    const cartaPath = 'https://chuysilva.github.io/Carta/carta.html';
    
    // Generar QR en el contenedor
    const qr = new QRCode('qrContainer', {
      text: cartaPath,
      width: 300,
      height: 300,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    // Mostrar la URL
    document.getElementById('urlText').textContent = 'URL: ' + cartaPath;

    // Descargar QR como imagen
    function descargarQR() {
      const container = document.getElementById('qrContainer');
      const canvas = container.querySelector('canvas');
      if (!canvas) {
        alert('El QR aún se está generando. Intenta de nuevo.');
        return;
      }
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'carta-qr.png';
      link.click();
    }
  </script>

</body>
</html>
