<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      padding: 16px;
    }

    #qrContainer {
      width: 320px;
      height: 320px;
      align-items: center;
    }
  </style>
</head>
<body>

  <div id="qrContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const cartaPath = 'https://chuysilva.github.io/Carta/carta.html';

    new QRCode('qrContainer', {
      text: cartaPath,
      width: 300,
      height: 300,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
